name: Auto Deploy Backend to VPS

on:
  push:
    branches:
      - main  # Ganti jadi main sesuai standar awal

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    environment: Development
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          script: |
            cd /opt/projects/sihedaf_be

            # Ambil kode terbaru
            git pull origin main

            # Build ulang image Docker
            docker build -t sihedaf_be .

            # Stop & remove container lama kalau ada
            docker stop sihedaf_be-server || true
            docker rm sihedaf_be-server || true

            # Run container baru dengan env & expose port
            docker run -d \
              --name sihedaf_be-server \
              --network docker-db_db-network \
              -p 4003:4003 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e PORT="${{ secrets.PORT }}" \
              -e MQTT_BROKER_URL="${{ secrets.MQTT_BROKER_URL }}" \
              -e MQTT_USERNAME="${{ secrets.MQTT_USERNAME }}" \
              -e MQTT_PASSWORD="${{ secrets.MQTT_PASSWORD }}" \
              --restart unless-stopped \
              sihedaf_be

            # Jalankan migrasi Prisma (jika ada)
            docker exec -i sihedaf_be-server npx prisma migrate deploy
